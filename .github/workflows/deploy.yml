name: Deploy SportShop to AWS VPS

# Kích hoạt sau khi workflow build/push Docker Hub chạy thành công
on:
  workflow_run:
    workflows: ["Build And Push Docker Images"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'dev' || github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: 1. Kéo source code mới nhất
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 2. Copy code sang VPS AWS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/sportshop"
          # Ghi đè file mới lên file cũ. Yên tâm là nó sẽ KHÔNG xóa file .env mà bạn đã tự tay tạo trên VPS.

      - name: 3. Chạy lệnh Deploy trên VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Di chuyển vào thư mục chứa code
            cd ~/sportshop

            # Tương thích cả Docker Compose V2 (docker compose) và V1 (docker-compose)
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Khong tim thay Docker Compose tren VPS"
              exit 1
            fi

            # Thiết lập tag image cần deploy từ Docker Hub theo nhánh
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}"
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"

            if [ "$BRANCH_NAME" = "main" ]; then
              export IMAGE_TAG="latest"
            elif [ "$BRANCH_NAME" = "dev" ]; then
              export IMAGE_TAG="dev-latest"
            else
              echo "Branch khong duoc ho tro cho deploy: $BRANCH_NAME"
              exit 1
            fi

            if [ -z "$DOCKERHUB_USERNAME" ]; then
              echo "Thieu secret DOCKERHUB_USERNAME"
              exit 1
            fi

            echo "Deploy branch: $BRANCH_NAME"
            echo "Using image tag: $IMAGE_TAG"

            # Đăng nhập Docker Hub để pull image (hữu ích khi repo private)
            if [ -n "${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            # Pull image mới trước; nếu pull lỗi thì giữ nguyên dịch vụ đang chạy
            $COMPOSE_CMD pull

            # Recreate container từ image mới (không build trên VPS)
            $COMPOSE_CMD up -d --no-build --force-recreate --remove-orphans

            # In trạng thái để dễ debug nếu có lỗi runtime
            $COMPOSE_CMD ps

            # Xóa các Docker image "rác" sinh ra trong quá trình build để giải phóng ổ cứng (giữ lại 28GB cho bạn)
            docker image prune -f
