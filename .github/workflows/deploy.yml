name: Deploy SportShop to AWS VPS

# Kích hoạt sau khi workflow build/push Docker Hub chạy thành công
on:
  workflow_run:
    workflows: ["Build And Push Docker Images"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    runs-on: ubuntu-latest

    steps:
      - name: 1. Kéo source code mới nhất
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 2. Copy code sang VPS AWS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/sportshop"
          # Ghi đè file mới lên file cũ. Yên tâm là nó sẽ KHÔNG xóa file .env mà bạn đã tự tay tạo trên VPS.

      - name: 3. Chạy lệnh Deploy trên VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Di chuyển vào thư mục chứa code
            cd ~/sportshop

            # Tương thích cả Docker Compose V2 (docker compose) và V1 (docker-compose)
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Khong tim thay Docker Compose tren VPS"
              exit 1
            fi

            # Thiết lập tag image cần deploy từ Docker Hub
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="dev-latest"

            if [ -z "$DOCKERHUB_USERNAME" ]; then
              echo "Thieu secret DOCKERHUB_USERNAME"
              exit 1
            fi

            # Đăng nhập Docker Hub để pull image (hữu ích khi repo private)
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            # Dừng và xóa các container cũ đang chạy
            $COMPOSE_CMD down || true

            # Pull image mới từ Docker Hub và chạy lại container (không build tại VPS)
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --force-recreate --remove-orphans

            # In trạng thái để dễ debug nếu có lỗi runtime
            $COMPOSE_CMD ps

            # Xóa các Docker image "rác" sinh ra trong quá trình build để giải phóng ổ cứng (giữ lại 28GB cho bạn)
            docker image prune -f
