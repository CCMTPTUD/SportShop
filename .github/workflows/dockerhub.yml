name: Build And Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: ["dev", "main"]
    paths:
      - "client/**"
      - "server/**"
      - ".github/workflows/dockerhub.yml"

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing Docker Hub username secret. Set DOCKERHUB_USERNAME (or DOCKER_USERNAME)."
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing Docker Hub token secret. Set DOCKERHUB_TOKEN (or DOCKER_TOKEN)."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            BRANCH_TAG="latest"
          else
            BRANCH_TAG="dev-latest"
          fi
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/sportshop-server:${{ steps.vars.outputs.branch_tag }}
            ${{ env.DOCKERHUB_USERNAME }}/sportshop-server:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/sportshop-client:${{ steps.vars.outputs.branch_tag }}
            ${{ env.DOCKERHUB_USERNAME }}/sportshop-client:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
