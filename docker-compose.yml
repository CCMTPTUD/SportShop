services:
  mongo:
    image: mongo:7
    container_name: sportshop-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  server:
    image: dawnphm/sportshop-server:${IMAGE_TAG:-dev-latest}
    container_name: sportshop-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/sportswear_shop
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    image: dawnphm/sportshop-client:${IMAGE_TAG:-dev-latest}
    container_name: sportshop-client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
